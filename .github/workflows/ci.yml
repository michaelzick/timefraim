name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_ENV: test
  APP_ORIGIN: http://127.0.0.1:5173,http://localhost:5173
  API_BASE_URL: http://127.0.0.1:4000
  PORT: 4000
  MCP_BEARER_TOKEN: replace-with-a-long-random-token
  MCP_READ_ONLY_TOKEN: replace-with-a-second-long-random-token
  ALLOWED_EMAIL: you@example.com
  SUPABASE_URL: http://127.0.0.1:55331
  SUPABASE_ANON_KEY: replace-with-local-supabase-anon-key
  SUPABASE_SERVICE_ROLE_KEY: replace-with-local-supabase-service-role-key
  SUPABASE_JWT_SECRET: replace-with-local-supabase-jwt-secret
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:55332/postgres
  GOOGLE_CLIENT_ID: replace-with-google-client-id
  GOOGLE_CLIENT_SECRET: replace-with-google-client-secret
  GOOGLE_CALENDAR_ID: primary
  TOGGL_WORKSPACE_ID: ""
  TUNNEL_PUBLIC_BASE_URL: ""
  VITE_APP_ORIGIN: http://127.0.0.1:5173
  VITE_API_BASE_URL: http://127.0.0.1:4000
  VITE_SUPABASE_URL: http://127.0.0.1:55331
  VITE_SUPABASE_ANON_KEY: replace-with-local-supabase-anon-key
  VITE_ALLOWED_EMAIL: you@example.com

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Agent brief sync
        run: pnpm agent-briefs:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
