<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeFraim</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#ffffff" />
    <meta property="og:title" content="TimeFraim" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/img/timefraim-logo.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/img/timefraim-logo.webp" />
    <style>
      html {
        transition: none !important;
      }

      html.theme-resolving *,
      html.theme-resolving *::before,
      html.theme-resolving *::after {
        transition: none !important;
        animation: none !important;
      }
    </style>
    <script>
      (function () {
        try {
          document.documentElement.classList.add("theme-resolving");

          var key = "ui-theme";
          var value = null;

          try {
            value = localStorage.getItem(key);
          } catch {}

          if (!value) {
            try {
              var cookieMatch = document.cookie.match("(^|; )" + key + "=([^;]*)");
              if (cookieMatch) {
                value = decodeURIComponent(cookieMatch[2]);
              }
            } catch {}
          }

          if (!/^(light|dark|system)$/.test(value || "")) {
            value = "system";
          }

          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolvedTheme = value === "system" ? (prefersDark ? "dark" : "light") : value;
          var root = document.documentElement;

          root.classList.remove("light", "dark");
          root.classList.add(resolvedTheme);
          root.style.colorScheme = resolvedTheme;
        } catch {}
        finally {
          try {
            document.documentElement.classList.remove("theme-resolving");
          } catch {}
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
